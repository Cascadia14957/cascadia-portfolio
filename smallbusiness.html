<!DOCTYPE html>
<html>
<head>
  <title>Small Business Demo Website</title>

  <style>

</head>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f3fbf8;
  color: #1f2937;
  text-align: center;
}

.hero {
  background:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
    url("cleaning-banner.jpg");
  background-size: cover;
  background-position: center;
  padding: 120px 20px;
  color: #1f4d3a;
}

.hero h1 {
  font-size: 52px;
  margin-bottom: 15px;
}

.hero p {
  font-size: 20px;
  margin-bottom: 30px;
}

.button {
  display: inline-block;
  background-color: #2f855a;
  color: white;
  padding: 14px 30px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
}

.section {
  padding: 75px 20px;
}

.section h2 {
  font-size: 34px;
  color: #1f4d3a;
  margin-bottom: 15px;
}

.services-row {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 35px;
}

.service-card {
  background-color: white;
  width: 280px;
  padding: 35px 25px;
  border-radius: 25px;
  box-shadow: 0 8px 25px rgba(47, 133, 90, 0.12);
  border: 1px solid #d9f2e6;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.service-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 30px rgba(47, 133, 90, 0.2);
}

.service-card h3 {
  color: #2f855a;
  font-size: 22px;
}

.why-section {
  background-color: white;
  padding: 80px 20px;
}

.why-section p {
  max-width: 700px;
  margin: 0 auto;
  font-size: 18px;
  line-height: 1.6;
}

.contact-section {
  background-color: #dff7ec;
  padding: 80px 20px;
}

.contact-section h2 {
  color: #1f4d3a;
  font-size: 36px;
}

.contact-section p {
  font-size: 18px;
  margin-bottom: 25px;
}

footer {
  background-color: #1f4d3a;
  color: white;
  padding: 25px;
}
<body>

  <div class="hero">
    <h1>Evergreen Cleaning Co.</h1>
    <p>Reliable cleaning services for homes and small businesses</p>
    <a href="#contact" class="cta-button">Get a Free Estimate</a>
  </div>

  <div class="section">
    <h2>Our Services</h2>

    <div class="row">
      <div class="box">
        <h3>Home Cleaning</h3>
        <p>Routine cleaning to keep your home fresh and comfortable.</p>
      </div>

      <div class="box">
        <h3>Office Cleaning</h3>
        <p>Professional cleaning services for small offices and workspaces.</p>
      </div>

      <div class="box">
        <h3>Move-Out Cleaning</h3>
        <p>Deep cleaning for rentals, homes, and move-out preparation.</p>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Why Choose Us?</h2>
    <p>We provide dependable service, flexible scheduling, and attention to detail.</p>
  </div>

  <div class="section" id="contact">
    <h2>Contact Us</h2>
    <p>Ready for a cleaner space? Contact us today.</p>
    <a href="#" class="cta-button">Call Now</a>
  </div>

  <a href="index.html" class="cta-button">← Back to Portfolio</a>

  <footer>
    <p>&copy; 2026 Evergreen Cleaning Co. Demo website by Cascadia Web Development.</p>
  </footer>

</body>
</html>
