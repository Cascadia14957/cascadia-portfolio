<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Demo Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      text-align: center;
    }

    .hero {
      background-color: #8b2f2f;
      color: white;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
    }

    .section {
      padding: 60px 20px;
      background-color: white;
    }

    .menu-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .menu-item {
      background-color: #f9f9f9;
      padding: 25px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .menu-item h3 {
      color: #8b2f2f;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #8b2f2f;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    footer {
      background-color: #333;
      color: white;
      padding: 20px;
    }

    .cta-button {
  display: inline-block;
  margin: 30px auto;
}
.menu-item img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 15px;
  display: block;
}
.menu-item {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.menu-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
.menu-item img {
  transition: transform 0.3s ease;
}

.menu-item:hover img {
  transform: scale(1.05);
}
  
  </stylbutton {

}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}e>
