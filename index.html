<!DOCTYPE html>
<html>
<head>
  <title>Cascadia Web Development</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      text-align: center;
      color: #111;
    }

    /* Banner section */
    .hero img {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      display: block;
    }

    /* Main content */
    .container {
      padding: 40px 20px;
    }

    /* Logo styling */
    .logo {
      max-width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #333;
      margin: 10px 0;
    }

    .coming-soon {
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Banner (no text overlay) -->
  <div class="hero">
    <img src="banner.png" alt="Cascadia Web Development Banner">
  </div>

  <!-- Main content -->
  <div class="container">

    <!-- Logo -->
    <img class="logo" src="Company logo.png" alt="Cascadia Web Development Logo">

    <!-- Title -->
    <h1>Cascadia Web Development</h1>

    <!-- Description -->
    <p>Web development, website maintenance, and hosting services.</p>

    <!-- Coming soon -->
    <p class="coming-soon">Coming Soon</p>
    <p>We are building something great. Please check back soon.</p>

  </div>

</body>
</html>
